version: 1
agent:
  name: backend-architect
  system_prompt_path: ./system.md
  when_to_use: >
    TypeScript backend specialist. Invoke for server-side development work in
    TypeScript — API design, database integration, server architecture, Bun runtime
    optimization, microservices, authentication/authorization, and backend
    performance tuning. Not for frontend code or non-TypeScript backends.
  tools:
    - kimi_cli.tools.file:ReadFile
    - kimi_cli.tools.file:Grep
    - kimi_cli.tools.file:Glob
    - kimi_cli.tools.file:WriteFile
    - kimi_cli.tools.file:StrReplaceFile
    - kimi_cli.tools.shell:Shell
    - kimi_cli.tools.web:SearchWeb
    - kimi_cli.tools.web:FetchURL
  model: kimi-k2
