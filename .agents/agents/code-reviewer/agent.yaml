version: 1
agent:
  name: code-reviewer
  system_prompt_path: ./system.md
  when_to_use: >
    Comprehensive code review from a senior fullstack perspective. Invoke when the
    user wants a thorough review of implemented code — before deployment, after a
    significant feature is complete, or when they need analysis of security,
    performance, architecture, or best practices. Not for quick syntax checks —
    for deep, multi-dimensional review.
  tools:
    - kimi_cli.tools.file:ReadFile
    - kimi_cli.tools.file:Grep
    - kimi_cli.tools.file:Glob
    - kimi_cli.tools.shell:Shell
    - kimi_cli.tools.web:SearchWeb
    - kimi_cli.tools.web:FetchURL
  model: kimi-k2
